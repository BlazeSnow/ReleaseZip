name: ReleaseZip

on:
  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: repo-zip
      retention_days:
        required: false
        type: number
        default: 7

  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Artifact name"
        required: false
        type: string
        default: "repo-zip"
      retention_days:
        description: "Artifact retention days"
        required: false
        type: number
        default: 7

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        INPUT_RETENTION_DAYS: ${{ inputs.retention_days }}
      run: |
        set -euo pipefail

        if [ -z "$INPUT_ARTIFACT_NAME" ]; then
          echo "artifact_name cannot be empty"
          exit 1
        fi

        if [ "$INPUT_RETENTION_DAYS" -lt 1 ] || [ "$INPUT_RETENTION_DAYS" -gt 90 ]; then
          echo "retention_days must be between 1 and 90"
          exit 1
        fi

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        lfs: true
        fetch-depth: 1
        submodules: true

    - name: Build zip package
      run: cd "$GITHUB_WORKSPACE" && zip -r "${{ inputs.artifact_name }}.zip" . -x ".git/*"

    - name: Generate sha256 file
      run: sha256sum "${{ inputs.artifact_name }}.zip" > "${{ inputs.artifact_name }}.zip.sha256"

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact_name }}_bundle
        path: |
          ${{ inputs.artifact_name }}.zip
          ${{ inputs.artifact_name }}.zip.sha256
        if-no-files-found: error
        retention-days: ${{ inputs.retention_days }}
