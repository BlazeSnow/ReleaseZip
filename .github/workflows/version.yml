name: Version

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'v1.0.0b1'
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        lfs: true

    - uses: ncipollo/release-action@v1
      with:
        tag: ${{ inputs.tag }}
        prerelease: ${{ inputs.prerelease }}
